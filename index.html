<body>

<div class="container">
  <h1>Consulta de Acceso Abierto por ORCID</h1>

  <div class="search-box">
    <label for="orcidInput">ORCID</label>
    <input 
      type="text" 
      id="orcidInput" 
      placeholder="0000-0000-0000-0000"
    />
    <button id="searchBtn">Consultar</button>
  </div>

  <div id="status" class="status-box"></div>

  <div class="table-container">
    <table id="resultsTable">
      <thead>
        <tr>
          <th>Título</th>
          <th>DOI</th>
          <th>OA</th>
          <th>Revista</th>
          <th>Año</th>
          <th>Editorial</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
