<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Consulta de Acceso Abierto por ORCID</title>

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <div class="container">

    <h1>Consulta de Acceso Abierto por ORCID</h1>

    <!-- Buscador -->
    <div class="search-box">

      <label for="orcidInput">ORCID</label>

      <input
        type="text"
        id="orcidInput"
        placeholder="0000-0000-0000-0000"
      >

      <button id="searchBtn">
        Consultar
      </button>

    </div>

    <!-- Estado -->
    <div id="status" class="status-box"></div>

    <!-- Resultados -->
    <div class="table-container">

      <table id="resultsTable">

        <thead>
          <tr>
            <th>Título</th>
            <th>DOI</th>
            <th>OA</th>
            <th>Revista</th>
            <th>Año</th>
            <th>Editorial</th>
          </tr>
        </thead>

        <tbody>
        </tbody>

      </table>

    </div>

  </div>

  <!-- Script principal -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
