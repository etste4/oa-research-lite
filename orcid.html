<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Consulta de Acceso Abierto por ORCID</title>

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <div class="container">

    <div class="header">

  <div>
    <h1>Consulta de Acceso Abierto por ORCID</h1>
    <p class="subtitle">
      Vicerrectorado de Investigación - Universidad Nacional de Huancavelica
    </p>
  </div>

  <img src="assets/vri.png" alt="VRI UNH" class="logo-vri">

</div>
<a href="index.html">Ir a versión institucional</a>
    <!-- Buscador -->
    <div class="search-box">

      <label for="orcidInput">ORCID</label>

      <input
        type="text"
        id="orcidInput"
        placeholder="0000-0000-0000-0000"
      >

      <button id="searchBtn">
        Consultar
      </button>

    </div>

    <!-- Estado -->
    <div id="status" class="status-box"></div>

    <div id="summaryCards" class="summary-cards">
  <div class="summary-card">
    <span class="summary-label">Total artículos</span>
    <strong id="totalArticulos">0</strong>
  </div>

  <div class="summary-card">
    <span class="summary-label">Open Access</span>
    <strong id="totalOA">0</strong>
  </div>

  <div class="summary-card">
    <span class="summary-label">Con PDF</span>
    <strong id="totalPDF">0</strong>
  </div>

  <div class="summary-card">
    <span class="summary-label">Total citas</span>
    <strong id="totalCitas">0</strong>
  </div>

  <div class="summary-card">
    <span class="summary-label">En DOAJ</span>
    <strong id="totalDOAJ">0</strong>
  </div>
</div>

    <!-- Resultados -->
    <div id="resultsCards" class="results-cards-container"></div>

  </div>

  <!-- Script principal -->
  <script type="module" src="js/app_orcid.js"></script>

</body>
</html>
